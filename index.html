<!DOCTYPE html>
<html>
<head>
  <title>AI Document Verification</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      text-align: center;
      padding: 40px;
    }

    .card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      padding: 30px;
      border-radius: 15px;
      max-width: 500px;
      margin: auto;
    }

    input {
      margin: 15px 0;
    }

    button {
      background: #00c6ff;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #0072ff;
      color: white;
    }

    #result {
      margin-top: 20px;
      text-align: left;
      background: rgba(0,0,0,0.3);
      padding: 15px;
      border-radius: 10px;
      max-height: 200px;
      overflow-y: auto;
    }
  </style>
</head>
<body>

  <h1>AI Document Verification System</h1>

  <div class="card">
    <input type="file" id="fileInput" />
    <br>
    <button onclick="uploadFile()">Verify Document</button>

    <div id="result"></div>
  </div>

<script>
async function uploadFile() {
  const fileInput = document.getElementById("fileInput");
  const resultDiv = document.getElementById("result");

  if (!fileInput.files.length) {
    alert("Please select a file");
    return;
  }

  const formData = new FormData();
  formData.append("file", fileInput.files[0]);

  resultDiv.innerHTML = "Processing...";

  try {
    const response = await fetch(
      "https://beerathanuja12-apts-verifier.hf.space/verify",
      {
        method: "POST",
        body: formData
      }
    );

    const data = await response.json();

    resultDiv.innerHTML = `
      <b>Status:</b> ${data.status}<br>
      <b>Average Confidence:</b> ${data.average_confidence}<br>
      <b>Reliable:</b> ${data.is_reliable}<br><br>
      <b>Extracted Text:</b><br>${data.extracted_text}
    `;
  } catch (error) {
    resultDiv.innerHTML = "Error connecting to server.";
  }
}
</script>

</body>
</html>
